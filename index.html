  // ---- État ----
  let state = 'menu'; // menu | play | dead
  let bird, pipes, score, best, lastPipeTime, groundOffset, deadTime;
  best = parseInt(localStorage.getItem('flappy_best') || '0', 10);

  function reset() {
    bird = { y: H / 2, vy: 0, rot: 0, wing: 0 };
    pipes = [];
    score = 0;
    lastPipeTime = 0;
    groundOffset = 0;
  }
  reset();

  // ---- Sons (Web Audio, pas de fichiers) ----
  let audioCtx = null;
  function beep(freq, dur, type = 'square', vol = 0.15) {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type;
      o.frequency.value = freq;
      g.gain.setValueAtTime(vol, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      o.connect(g).connect(audioCtx.destination);
      o.start();
      o.stop(audioCtx.currentTime + dur);
    } catch (e) { /* audio non dispo */ }
  }
  const sfxFlap = () => beep(520, 0.08, 'triangle', 0.2);
  const sfxScore = () => { beep(880, 0.08, 'sine', 0.18); setTimeout(() => beep(1175, 0.1, 'sine', 0.18), 80); };
  const sfxDie = () => { beep(300, 0.15, 'sawtooth', 0.2); setTimeout(() => beep(180, 0.3, 'sawtooth', 0.2), 120); };

  // ---- Entrées ----
  function flap() {
    if (state === 'menu') {
      state = 'play';
      lastPipeTime = performance.now();
    }
    if (state === 'play') {
      bird.vy = JUMP;
      bird.wing = 1;
      sfxFlap();
    } else if (state === 'dead' && performance.now() - deadTime > 500) {
      reset();
      state = 'menu';
    }
  }

  });
  canvas.addEventListener('pointerdown', flap);

  // ---- Logique ----
  function spawnPipe() {
    const margin = 60;
    const gapY = margin + Math.random() * (H - GROUND_H - PIPE_GAP - margin * 2);
    pipes.push({ x: W + PIPE_WIDTH, gapY, passed: false });
  }

  function update(now, dt) {
    groundOffset = (groundOffset + PIPE_SPEED * dt) % 24;

    if (state !== 'play') {
      // l'oiseau flotte doucement au menu
      if (state === 'menu') bird.y = H / 2 + Math.sin(now / 300) * 8;
      if (state === 'dead' && bird.y < H - GROUND_H - BIRD_R) {
        bird.vy += GRAVITY * dt;

    bird.y += bird.vy * dt;

    bird.wing = Math.max(0, bird.wing - 0.05 * dt);

    // Tuyaux
    if (now - lastPipeTime > PIPE_INTERVAL) {
      spawnPipe();
      lastPipeTime = now;
    }
    for (const p of pipes) {
      p.x -= PIPE_SPEED * dt;
      if (!p.passed && p.x + PIPE_WIDTH < BIRD_X - BIRD_R) {
        p.passed = true;
        score++;
        sfxScore();
      }
    }
    pipes = pipes.filter(p => p.x > -PIPE_WIDTH);

    // Collisions
    if (bird.y + BIRD_R >= H - GROUND_H || bird.y - BIRD_R <= 0) return die();
    for (const p of pipes) {
      if (BIRD_X + BIRD_R > p.x && BIRD_X - BIRD_R < p.x + PIPE_WIDTH) {
        if (bird.y - BIRD_R < p.gapY || bird.y + BIRD_R > p.gapY + PIPE_GAP) return die();
      }
    }
  }

    state = 'dead';

    sfxDie();
    if (score > best) {
      best = score;
      localStorage.setItem('flappy_best', best);
    }
  }

  // ---- Rendu ----
  function drawBackground(now) {
    // Ciel dégradé
    const sky = ctx.createLinearGradient(0, 0, 0, H);

    sky.addColorStop(1, '#a8e2e8');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // Nuages

    const cloudShift = (now / 60) % (W + 200);
    for (const [cx, cy, s] of [[80, 90, 1], [260, 150, 0.7], [400, 60, 0.9]]) {

      ctx.beginPath();
      ctx.arc(x, cy, 22 * s, 0, Math.PI * 2);
      ctx.arc(x + 22 * s, cy - 8 * s, 18 * s, 0, Math.PI * 2);
      ctx.arc(x + 44 * s, cy, 20 * s, 0, Math.PI * 2);
      ctx.fill();
    }

    // Collines
    ctx.fillStyle = '#7ed07e';
    for (let i = -1; i < 5; i++) {
      ctx.beginPath();
      ctx.arc(i * 120 + 40, H - GROUND_H + 30, 70, Math.PI, 0);
      ctx.fill();
    }
  }

  function drawPipes() {
    for (const p of pipes) {
      drawPipe(p.x, 0, p.gapY, true);
      drawPipe(p.x, p.gapY + PIPE_GAP, H - GROUND_H - p.gapY - PIPE_GAP, false);
    }
  }

  function drawPipe(x, y, h, isTop) {
    const grad = ctx.createLinearGradient(x, 0, x + PIPE_WIDTH, 0);
    grad.addColorStop(0, '#5ca832');
    grad.addColorStop(0.4, '#8fd94f');
    grad.addColorStop(1, '#4a8a28');
    ctx.fillStyle = grad;
    ctx.fillRect(x, y, PIPE_WIDTH, h);
    // Chapeau du tuyau
    const capY = isTop ? y + h - 26 : y;
    ctx.fillRect(x - 5, capY, PIPE_WIDTH + 10, 26);
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.lineWidth = 2;
    ctx.strokeRect(x - 5, capY, PIPE_WIDTH + 10, 26);
    ctx.strokeRect(x, y, PIPE_WIDTH, h);
  }

  function drawGround() {
    ctx.fillStyle = '#ded895';
    ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
    ctx.fillStyle = '#c9b458';
    for (let x = -24; x < W + 24; x += 24) {
      ctx.beginPath();
      ctx.moveTo(x - groundOffset, H - GROUND_H);
      ctx.lineTo(x - groundOffset + 12, H - GROUND_H);
      ctx.lineTo(x - groundOffset + 24, H - GROUND_H + 12);
      ctx.lineTo(x - groundOffset + 12, H - GROUND_H + 12);
      ctx.closePath();
      ctx.fill();
    }
    ctx.fillStyle = '#8a7a3a';
    ctx.fillRect(0, H - GROUND_H + 12, W, 4);
  }

  function drawBird() {
    ctx.save();
    ctx.translate(BIRD_X, bird.y);
    ctx.rotate(bird.rot);

    if (birdImgReady) {
      const r = BIRD_R + 6; // rayon visuel un peu plus grand que la hitbox
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.closePath();
      // Cercle blanc de fond + découpe circulaire du badge
      ctx.fillStyle = 'white';
      ctx.fill();
      ctx.clip();
      ctx.drawImage(birdImg, -r, -r, r * 2, r * 2);
      ctx.restore();
      // Contour
      ctx.save();
      ctx.translate(BIRD_X, bird.y);
      ctx.rotate(bird.rot);
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(0,0,0,0.35)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();
      return;
    }

    // Secours si l'image n'est pas encore chargée : oiseau dessiné
    ctx.fillStyle = '#ffd934';
    ctx.beginPath();
    ctx.ellipse(0, 0, BIRD_R + 3, BIRD_R, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#c9a012';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(7, -5, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(8.5, -5, 2.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#ff7b1c';
    ctx.beginPath();
    ctx.moveTo(12, 0);
    ctx.lineTo(22, 3);
    ctx.lineTo(12, 7);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function drawText(text, x, y, size, color = 'white', align = 'center') {
    ctx.font = `bold ${size}px 'Segoe UI', Arial, sans-serif`;
    ctx.textAlign = align;
    ctx.lineWidth = size / 8;
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.strokeText(text, x, y);
    ctx.fillStyle = color;
    ctx.fillText(text, x, y);
  }

  function drawUI(now) {
    if (state === 'play') {
      drawText(score, W / 2, 80, 48);
    } else if (state === 'menu') {
      drawText('Link Click Bump', W / 2, 180, 40, '#fff');
      const pulse = 0.7 + Math.sin(now / 250) * 0.3;
      ctx.globalAlpha = pulse;
      drawText('Clique ou appuie sur ESPACE', W / 2, H / 2 + 90, 20);
      ctx.globalAlpha = 1;
      if (best > 0) drawText(`Record : ${best}`, W / 2, 230, 22, '#ffe66d');
    } else if (state === 'dead') {
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(0, 0, W, H);
      drawText('Game Over', W / 2, 220, 44, '#ff6b6b');
      drawText(`Score : ${score}`, W / 2, 290, 30);
      drawText(`Record : ${best}`, W / 2, 335, 26, '#ffe66d');
      if (score >= best && score > 0) drawText('Nouveau record !', W / 2, 380, 22, '#7bed9f');
      if (now - deadTime > 500) {
        const pulse = 0.7 + Math.sin(now / 250) * 0.3;
        ctx.globalAlpha = pulse;
        drawText('Clique pour rejouer', W / 2, 440, 20);
        ctx.globalAlpha = 1;
      }
    }
  }

  // ---- Boucle principale ----
  let lastTime = performance.now();
  function loop(now) {
    // dt normalisé sur 60 fps pour rester fluide sur tous les écrans
    const dt = Math.min((now - lastTime) / (1000 / 60), 3);
    lastTime = now;

    update(now, dt);

    drawBackground(now);
    drawPipes();
    drawGround();
    drawBird();
    drawUI(now);

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
